rules:
  - id: no-user-input-in-path
    message: >
      User-controlled data flows into a filesystem path without sanitization.
      Validate all user-supplied names against a strict allowlist regex (e.g.
      /^[a-z][a-z0-9-]*$/) before constructing file paths. Never use raw
      request data in path.join, path.resolve, or fs calls.
    severity: ERROR
    languages: [typescript]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $REQ.params
      - patterns:
          - pattern: $REQ.body
      - patterns:
          - pattern: $REQ.query
    pattern-sinks:
      - patterns:
          - pattern: path.join(..., $SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: path.resolve(..., $SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: readFile($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: readFileSync($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: writeFile($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: writeFileSync($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: unlink($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: mkdir($SINK, ...)
        focus-metavariable: $SINK
    pattern-sanitizers:
      - patterns:
          - pattern: |
              /^[a-z][a-z0-9\-]*$/.test($X)
      - patterns:
          - pattern: |
              /^[a-z][a-z0-9_\-]*$/.test($X)
    metadata:
      category: security
      cwe: CWE-22
      owasp: A01:2021

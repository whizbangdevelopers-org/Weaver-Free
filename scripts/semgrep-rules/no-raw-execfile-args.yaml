rules:
  - id: no-raw-execfile-args
    message: >
      User-controlled data flows into a shell command argument without array isolation.
      Always pass execFile/spawn arguments as an array literal, never as a string or
      string concatenation. String form enables shell injection.
    severity: ERROR
    languages: [typescript]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $REQ.params
      - patterns:
          - pattern: $REQ.body
      - patterns:
          - pattern: $REQ.query
    pattern-sinks:
      - patterns:
          - pattern: exec($SINK)
      - patterns:
          - pattern: execSync($SINK)
      - patterns:
          - pattern: spawn($SINK, ...)
      - patterns:
          - pattern: spawnSync($SINK, ...)
      - patterns:
          - pattern: execFile($BIN, $SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: execFileAsync($BIN, $SINK, ...)
        focus-metavariable: $SINK
    metadata:
      category: security
      cwe: CWE-78
      owasp: A03:2021

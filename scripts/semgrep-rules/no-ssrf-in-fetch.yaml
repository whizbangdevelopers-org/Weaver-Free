rules:
  - id: no-ssrf-in-fetch
    message: >
      User-controlled data flows into an outbound HTTP request URL. This enables
      Server-Side Request Forgery (SSRF) — an attacker can redirect the server
      to internal services or metadata endpoints. Validate URLs against an
      allowlist of trusted hosts before use in fetch/axios calls.
    severity: ERROR
    languages: [typescript]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $REQ.params
      - patterns:
          - pattern: $REQ.body
      - patterns:
          - pattern: $REQ.query
    pattern-sinks:
      - patterns:
          - pattern: fetch($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: fetch($SINK)
        focus-metavariable: $SINK
      - patterns:
          - pattern: axios.get($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: axios.post($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: axios.put($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: axios.delete($SINK, ...)
        focus-metavariable: $SINK
      - patterns:
          - pattern: axios($SINK)
        focus-metavariable: $SINK
      - patterns:
          - pattern: new URL($SINK)
        focus-metavariable: $SINK
    pattern-sanitizers:
      - patterns:
          - pattern: ALLOWED_HOSTS.includes($X)
      - patterns:
          - pattern: isAllowedUrl($X)
    metadata:
      category: security
      cwe: CWE-918
      owasp: A10:2021

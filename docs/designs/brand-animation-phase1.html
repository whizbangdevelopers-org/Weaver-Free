<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>whizBANG! — Weaver Intro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  #stage {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  #skip-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }

  #replay-btn {
    position: fixed;
    top: 20px;
    right: 24px;
    font-size: 11px;
    color: #444;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
    opacity: 0;
    font-family: 'Inter', sans-serif;
    background: none;
    border: 1px solid #333;
    padding: 6px 14px;
    border-radius: 4px;
  }
  #replay-btn:hover { color: #888; border-color: #555; }
</style>
</head>
<body>

<div id="skip-hint">click to skip</div>
<button id="replay-btn">Replay</button>

<div id="stage">
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Spark body gradient -->
    <linearGradient id="sparkBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0D0"/>
      <stop offset="20%" stop-color="#FF6B35"/>
      <stop offset="60%" stop-color="#E8520D"/>
      <stop offset="100%" stop-color="#A83A08"/>
    </linearGradient>
    <linearGradient id="sparkCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFD8B8"/>
      <stop offset="100%" stop-color="#FFB088"/>
    </linearGradient>
    <!-- Bomb body gradient -->
    <radialGradient id="bombBody" cx="0.4" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="sparkGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="fuseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="explosionGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="coronaGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- ========== SCENE GROUPS ========== -->

  <!-- Explosion corona (behind everything) -->
  <circle id="explosionCorona" cx="400" cy="230" r="0" fill="#FF6B35" opacity="0" filter="url(#coronaGlow)"/>

  <!-- Explosion flash -->
  <circle id="explosionFlash" cx="400" cy="230" r="0" fill="white" opacity="0"/>

  <!-- Explosion particles (generated by JS) -->
  <g id="particles"></g>

  <!-- Bomb group -->
  <g id="bombGroup" transform="translate(400, 230)">
    <!-- Body -->
    <circle id="bombBodyCircle" cx="0" cy="0" r="36" fill="url(#bombBody)" stroke="#444" stroke-width="1.5"/>
    <!-- Shine -->
    <ellipse cx="-10" cy="-8" rx="10" ry="8" fill="#444" opacity="0.3"/>
    <!-- Fuse nub -->
    <rect id="fuseNub" x="24" y="-18" width="10" height="8" rx="3" fill="#555"/>
    <!-- Green ring -->
    <circle cx="0" cy="0" r="38" stroke="#2A4A20" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Fuse path (curved from bomb upward-right) -->
  <path id="fusePath" d="M 430 215 Q 460 190 450 155 Q 442 130 460 110"
        stroke="#555" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Fuse burn glow (same path, drawn on top) -->
  <path id="fuseBurn" d="M 430 215 Q 460 190 450 155 Q 442 130 460 110"
        stroke="#FF6B35" stroke-width="5" fill="none" stroke-linecap="round"
        opacity="0" filter="url(#fuseGlow)"/>

  <!-- Fuse burn tip (travels along the fuse) -->
  <circle id="fuseTip" cx="460" cy="110" r="5" fill="#FF6B35" opacity="0"/>
  <circle id="fuseTipCore" cx="460" cy="110" r="2.5" fill="#FFD8A0" opacity="0"/>

  <!-- The traveling spark (starts off-screen left) -->
  <g id="travelSpark" transform="translate(-60, 250)" opacity="0">
    <path d="M0 -16 L5 0 L3 -2 L8 12 L3 4 L4 18 L0 12 L-4 18 L-3 4 L-8 12 L-3 -2 L-5 0 Z"
          fill="url(#sparkBody)" filter="url(#sparkGlow)"/>
    <path d="M0 -8 L3 4 L1 2 L4 10 L0 6 L-4 10 L-1 2 L-3 4 Z"
          fill="url(#sparkCore)"/>
    <!-- Particles -->
    <circle cx="10" cy="-10" r="1.5" fill="#FF6B35" opacity="0.7"/>
    <circle cx="-10" cy="-10" r="1.5" fill="#FF6B35" opacity="0.7"/>
  </g>

  <!-- Final spark (emerges from explosion, larger) -->
  <g id="finalSpark" transform="translate(400, 230)" opacity="0">
    <path d="M0 -32 L10 0 L6 -4 L16 24 L8 12 L10 36 L0 26 L-10 36 L-8 12 L-16 24 L-6 -4 L-10 0 Z"
          fill="url(#sparkBody)" filter="url(#sparkGlow)"/>
    <path d="M0 -18 L6 6 L4 2 L8 18 L0 12 L-8 18 L-4 2 L-6 6 Z"
          fill="url(#sparkCore)"/>
    <circle cx="18" cy="-16" r="2" fill="#FF6B35" opacity="0.7"/>
    <circle cx="-18" cy="-16" r="2" fill="#FF6B35" opacity="0.7"/>
    <circle cx="22" cy="0" r="1.2" fill="#E8520D" opacity="0.4"/>
    <circle cx="-22" cy="0" r="1.2" fill="#E8520D" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark" opacity="0">
    <text x="400" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" letter-spacing="-1">
      <tspan id="microText" fill="#888" font-weight="300">micro</tspan><tspan fill="#E0E0E0" font-weight="700">vm</tspan>
    </text>
    <text id="subtitle" x="400" y="332" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="13" font-weight="400" letter-spacing="4" fill="#FF6B35" opacity="0">DASHBOARD</text>
  </g>

  <!-- "more coming soon" -->
  <text id="moreText" x="400" y="370" text-anchor="middle" font-family="Inter, sans-serif"
        font-size="11" font-weight="300" letter-spacing="2" fill="#444" opacity="0">more coming soon</text>

  <!-- whizBANG! footer badge — single-line layout matching current brand sheet -->
  <g id="footerBadge" opacity="0">
    <!-- Green gradient divider line -->
    <line x1="220" y1="406" x2="580" y2="406" stroke="#2A4A20" stroke-width="0.5" opacity="0.6"/>
    <!-- Left portion: "a" + whizBANG wordmark -->
    <text id="footerLeft" y="424" font-family="Inter, sans-serif" font-size="9">
      <tspan fill="#4A6A30">a </tspan>
      <tspan fill="#5A8A20" font-weight="400" font-style="italic">whiz</tspan><tspan id="footerBang" fill="#7AB800" font-weight="700">BANG</tspan>
    </text>
    <!-- Teardrop + bomb "!" — positioned by JS after BANG -->
    <g id="footerExcl" opacity="0">
      <!-- Teardrop stroke -->
      <path d="M0 -7 C1 -7, 1.3 -5.8, 0.9 -3.8 L0 -0.8 L-0.9 -3.8 C-1.3 -5.8, -1 -7, 0 -7 Z" fill="#7AB800"/>
      <!-- Bomb as dot -->
      <circle cx="0" cy="2.6" r="2.3" fill="#2A2A2A" stroke="#3A3A3A" stroke-width="0.3"/>
      <ellipse cx="-0.5" cy="1.8" rx="0.8" ry="0.6" fill="#444" opacity="0.3"/>
      <path d="M1.6 0.8 Q2.4 0 2.1 -1" stroke="#5A5A5A" stroke-width="0.4" fill="none" stroke-linecap="round"/>
      <circle cx="2.1" cy="-1.2" r="0.8" fill="#FF6B35" opacity="0.9"/>
      <circle cx="2.1" cy="-1.2" r="0.3" fill="#FFD8A0"/>
    </g>
    <!-- Right portion: DEVELOPERS product | copyright — positioned by JS -->
    <text id="footerRight" y="424" font-family="Inter, sans-serif" font-size="9">
      <tspan fill="#4A6A30" letter-spacing="0.8">DEVELOPERS</tspan>
      <tspan fill="#4A6A30" letter-spacing="0"> product</tspan>
      <tspan fill="#252525" dx="5">|</tspan>
      <tspan fill="#4A6A30" dx="5">&#169; 2026 whizBANG! Developers LLC</tspan>
    </text>
  </g>

</svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
<script>
gsap.registerPlugin(MotionPathPlugin);

// Create explosion particles
const particlesGroup = document.getElementById('particles');
const particleCount = 28;
const particles = [];

for (let i = 0; i < particleCount; i++) {
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', '400');
  circle.setAttribute('cy', '230');
  circle.setAttribute('r', String(2 + Math.random() * 4));

  // Mix of amber, orange, white, and a few green (company color)
  const colors = ['#FF6B35', '#FF6B35', '#E8520D', '#FFB088', '#FFD8A0', '#FFFFFF', '#7AB800'];
  circle.setAttribute('fill', colors[Math.floor(Math.random() * colors.length)]);
  circle.setAttribute('opacity', '0');
  particlesGroup.appendChild(circle);
  particles.push(circle);
}

// Position footer badge elements as centered single line
requestAnimationFrame(() => {
  const footerLeft = document.getElementById('footerLeft');
  const footerBang = document.getElementById('footerBang');
  const footerExcl = document.getElementById('footerExcl');
  const footerRight = document.getElementById('footerRight');
  if (!footerLeft || !footerBang || !footerExcl || !footerRight) return;

  // Measure widths to center the whole line
  const leftBox = footerLeft.getBBox();
  const exclWidth = 10; // teardrop+bomb "!" approximate width
  const rightBox = footerRight.getBBox();
  const gap = 2;
  const totalWidth = leftBox.width + gap + exclWidth + gap + rightBox.width;
  const startX = 400 - totalWidth / 2;

  // Position left text
  footerLeft.setAttribute('x', String(startX));

  // Position teardrop+bomb after BANG
  const bangEnd = footerBang.getEndPositionOfChar(footerBang.textContent.length - 1);
  footerExcl.setAttribute('transform', `translate(${bangEnd.x + 5}, ${bangEnd.y - 2})`);
  footerExcl.setAttribute('opacity', '1');

  // Position right text after the "!"
  footerRight.setAttribute('x', String(bangEnd.x + 5 + exclWidth + gap));
});

// Main timeline
const tl = gsap.timeline({ paused: true });

// 1. Spark appears (off-screen left, fades in)
tl.to('#travelSpark', {
  opacity: 1,
  duration: 0.3,
  ease: 'power2.out'
}, 0);

// Small pulse
tl.to('#travelSpark', {
  scale: 1.2,
  transformOrigin: '0 0',
  duration: 0.2,
  yoyo: true,
  repeat: 1,
  ease: 'power2.inOut'
}, 0.1);

// 2. Spark travels to the fuse tip
tl.to('#travelSpark', {
  motionPath: {
    path: [
      { x: 100, y: 200 },
      { x: 300, y: 140 },
      { x: 460, y: 110 }
    ],
    curviness: 1.2
  },
  duration: 1.0,
  ease: 'power2.inOut'
}, 0.4);

// Spark shrinks as it reaches the fuse
tl.to('#travelSpark', {
  scale: 0.6,
  opacity: 0,
  duration: 0.3,
  ease: 'power2.in'
}, 1.1);

// 3. Fuse ignites — tip appears
tl.to('#fuseTip', {
  opacity: 1,
  duration: 0.15,
  ease: 'power2.out'
}, 1.2);

tl.to('#fuseTipCore', {
  opacity: 1,
  duration: 0.15,
  ease: 'power2.out'
}, 1.2);

// Fuse burn glow appears
tl.to('#fuseBurn', {
  opacity: 0.7,
  duration: 0.1
}, 1.2);

// Fuse burns down — stroke-dasharray animation
// Get fuse path length
const fusePath = document.getElementById('fusePath');
const fuseBurn = document.getElementById('fuseBurn');
const fuseLength = fusePath.getTotalLength();

// Set up dash
fusePath.style.strokeDasharray = fuseLength;
fusePath.style.strokeDashoffset = 0;
fuseBurn.style.strokeDasharray = fuseLength;
fuseBurn.style.strokeDashoffset = fuseLength;

// Burn the fuse (reverse direction — from tip to bomb)
tl.to(fuseBurn.style, {
  strokeDashoffset: 0,
  duration: 0.8,
  ease: 'power1.in'
}, 1.25);

// Fuse tip travels along the fuse path toward the bomb
tl.to('#fuseTip', {
  motionPath: {
    path: '#fusePath',
    align: '#fusePath',
    alignOrigin: [0.5, 0.5],
    start: 1,
    end: 0
  },
  duration: 0.8,
  ease: 'power1.in'
}, 1.25);

tl.to('#fuseTipCore', {
  motionPath: {
    path: '#fusePath',
    align: '#fusePath',
    alignOrigin: [0.5, 0.5],
    start: 1,
    end: 0
  },
  duration: 0.8,
  ease: 'power1.in'
}, 1.25);

// Original fuse disappears as it burns
tl.to(fusePath.style, {
  strokeDashoffset: fuseLength,
  duration: 0.8,
  ease: 'power1.in'
}, 1.25);

// 4. Bomb swells (anticipation)
tl.to('#bombGroup', {
  scale: 1.15,
  transformOrigin: '0 0',
  duration: 0.25,
  ease: 'power2.in'
}, 1.95);

// Hide fuse elements
tl.to(['#fuseTip', '#fuseTipCore', '#fuseBurn', '#fuseNub'], {
  opacity: 0,
  duration: 0.1
}, 2.0);

// 5. EXPLOSION
// Flash
tl.to('#explosionFlash', {
  r: 120,
  opacity: 0.9,
  duration: 0.08,
  ease: 'power4.out'
}, 2.2);

tl.to('#explosionFlash', {
  r: 200,
  opacity: 0,
  duration: 0.4,
  ease: 'power2.out'
}, 2.28);

// Corona
tl.to('#explosionCorona', {
  r: 80,
  opacity: 0.3,
  duration: 0.1,
  ease: 'power4.out'
}, 2.2);

tl.to('#explosionCorona', {
  r: 160,
  opacity: 0,
  duration: 0.8,
  ease: 'power2.out'
}, 2.3);

// Bomb body disappears
tl.to('#bombGroup', {
  scale: 2,
  opacity: 0,
  transformOrigin: '0 0',
  duration: 0.3,
  ease: 'power2.out'
}, 2.2);

// Particles explode outward
particles.forEach((p, i) => {
  const angle = (i / particleCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
  const distance = 60 + Math.random() * 140;
  const dx = Math.cos(angle) * distance;
  const dy = Math.sin(angle) * distance;

  tl.to(p, {
    opacity: 0.9,
    duration: 0.05
  }, 2.2);

  tl.to(p, {
    attr: {
      cx: 400 + dx,
      cy: 230 + dy,
    },
    opacity: 0,
    duration: 0.5 + Math.random() * 0.4,
    ease: 'power2.out'
  }, 2.25);
});

// Measure "micro" text position — spark lands 10px to its left, vertically centered
const microEl = document.getElementById('microText');
let targetX = 333, targetY = 297; // fallback
if (microEl) {
  const box = microEl.getBBox();
  targetX = box.x - 10; // 10px left of "micro"
  targetY = box.y + box.height / 2; // vertically centered with text
}

// 6. Final spark emerges from center (explosion burst)
tl.fromTo('#finalSpark', {
  scale: 0,
  opacity: 0
}, {
  scale: 1,
  opacity: 1,
  duration: 0.4,
  ease: 'back.out(1.7)'
}, 2.5);

// Spark drifts upward briefly
tl.to('#finalSpark', {
  y: -40,
  duration: 0.4,
  ease: 'power2.out'
}, 2.8);

// Spark arcs down and left toward wordmark
tl.to('#finalSpark', {
  attr: { transform: `translate(${targetX}, ${targetY}) scale(0.45)` },
  duration: 1.8,
  ease: 'power4.out'
}, 3.2);

// Spark settles and dims slightly as it lands
tl.to('#finalSpark', {
  opacity: 0.7,
  attr: { transform: `translate(${targetX}, ${targetY}) scale(0.4)` },
  duration: 0.3,
  ease: 'power2.inOut'
}, 4.8);

// 7. Wordmark fades in BEFORE spark arrives
tl.to('#wordmark', {
  opacity: 1,
  duration: 0.6,
  ease: 'power2.out'
}, 2.8);

// 8. DASHBOARD subtitle
tl.to('#subtitle', {
  opacity: 1,
  duration: 0.4,
  ease: 'power2.out'
}, 4.7);

// 9. "more coming soon"
tl.to('#moreText', {
  opacity: 1,
  duration: 0.5,
  ease: 'power2.out'
}, 5.1);

// 10. Footer badge
tl.to('#footerBadge', {
  opacity: 1,
  duration: 0.5,
  ease: 'power2.out'
}, 5.4);

// Hide skip hint
tl.to('#skip-hint', {
  opacity: 0,
  duration: 0.3
}, 2.5);

// Show replay button
tl.to('#replay-btn', {
  opacity: 1,
  duration: 0.3
}, 5.8);

// Start playback
tl.play();

// Skip on click
document.body.addEventListener('click', (e) => {
  if (e.target.id === 'replay-btn') return;
  if (tl.progress() < 1) {
    tl.progress(1);
  }
});

// Replay
document.getElementById('replay-btn').addEventListener('click', () => {
  gsap.set('#replay-btn', { opacity: 0 });
  gsap.set('#skip-hint', { opacity: 1 });

  // Reset fuse dash states
  fusePath.style.strokeDashoffset = '0';
  fuseBurn.style.strokeDashoffset = String(fuseLength);

  // Reset particle positions
  particles.forEach(p => {
    p.setAttribute('cx', '400');
    p.setAttribute('cy', '230');
    p.setAttribute('opacity', '0');
  });

  tl.restart();
});
</script>

</body>
</html>

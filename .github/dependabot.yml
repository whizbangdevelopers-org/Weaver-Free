# Dependabot configuration for Weaver
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Major version updates for framework deps are ignored here (Quasar, Fastify).
# They still appear as PRs for non-ignored deps; the labeler workflow triages
# those into ready-to-merge / blocked-by-quasar / needs-review.

version: 2
updates:
  # Root package (frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
    groups:
      # Group minor and patch updates together to reduce PR noise
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version updates for framework dependencies
    # These require upstream compatibility testing before upgrading
    ignore:
      # Quasar ecosystem — wait for upstream guidance
      # Check: https://github.com/quasarframework/quasar/releases
      - dependency-name: "quasar"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@quasar/*"
        update-types: ["version-update:semver-major"]
      # ESLint v9 + @typescript-eslint v8 — flat config migration required
      # Planned upgrade, not ad-hoc dependabot bumps
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]

  # Backend package
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Fastify 5 — breaking API changes, deferred post-v1.0
      # Check: https://fastify.dev/docs/latest/Guides/Migration-Guide-V5/
      - dependency-name: "fastify"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
      - "automated"
    commit-message:
      prefix: "chore(actions):"

# Demo Deployment
# CREATED IN: Dev repo (when any demo option chosen)
# USED BY: Continuous deployment of demo app
# TRIGGERS: Push to main (src changes), manual
#
# REQUIRED SECRETS:
#   - DEMO_GITHUB_TOKEN: PAT from demo account with repo scope
#   - VITE_DEMO_TOKEN_P1: Split demo token part 1 (if demo with login)
#   - VITE_DEMO_TOKEN_P2: Split demo token part 2 (if demo with login)
#   - VITE_HCAPTCHA_SITEKEY: hCaptcha site key (if demo with login)
#
# PLACEHOLDERS (replaced by setup-project.sh):
#   - {{PROJECT_NAME}}: Project name (lowercase)

name: Demo Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'quasar.config.cjs'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

env:
  DEMO_REPO: {{PROJECT_NAME}}-demo/{{PROJECT_NAME}}-demo.github.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA for demo
        env:
          VITE_DEMO_MODE: 'true'
          VITE_HCAPTCHA_SITEKEY: ${{ secrets.VITE_HCAPTCHA_SITEKEY }}
          VITE_DEMO_TOKEN_P1: ${{ secrets.VITE_DEMO_TOKEN_P1 }}
          VITE_DEMO_TOKEN_P2: ${{ secrets.VITE_DEMO_TOKEN_P2 }}
        run: npx quasar build -m spa

      - name: Prepare deployment
        run: |
          # Create .nojekyll for GitHub Pages
          touch dist/spa/.nojekyll

          # Copy demo README if exists
          if [ -f demo/DEMO-README.md ]; then
            cp demo/DEMO-README.md dist/spa/README.md
          fi

      - name: Deploy to demo repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEMO_GITHUB_TOKEN }}
          repository-name: ${{ env.DEMO_REPO }}
          branch: main
          folder: dist/spa
          clean-exclude: README.md
          commit-message: "Deploy demo app - ${{ github.sha }}"

      - name: Summary
        run: |
          DEMO_ACCOUNT="${{ env.DEMO_REPO }}"
          DEMO_ACCOUNT="${DEMO_ACCOUNT%%/*}"
          echo "## Demo Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${DEMO_ACCOUNT}.github.io" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

# Approved Audit Exceptions
# Each entry must be explicitly approved. This file is the source of truth
# for both human policy and CI enforcement (security-scan.yml reads allow-ghsas).
#
#
# Fields:
#   ghsa:           GitHub Security Advisory ID
#   package:        npm package name
#   severity:       low | moderate | high | critical
#   dev_only:       true if only in devDependencies tree
#   controlled_by:  "quasar" | "eslint" | "fastify" | "direct"
#   production:     true if the vuln is in the production bundle/runtime
#   approved_date:  YYYY-MM-DD
#   expires_when:   condition under which this exception should be removed
#   notes:          brief rationale


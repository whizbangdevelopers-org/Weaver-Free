name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: checkboxes
    id: documentation
    attributes:
      label: Documentation
      description: Please confirm you've checked the relevant docs before filing.
      options:
        - label: I have read the [README](https://github.com/whizbangdevelopers-org/Weaver-Free#readme)
          required: true
        - label: I have checked the [Admin Guide](https://github.com/whizbangdevelopers-org/Weaver-Free/blob/main/docs/ADMIN-GUIDE.md) and [User Guide](https://github.com/whizbangdevelopers-org/Weaver-Free/blob/main/docs/USER-GUIDE.md)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: I also considered...
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Target Platform
      description: Which platform(s) would this feature apply to?
      multiple: true
      options:
        - NixOS (native install)
        - Docker
        - Web (browser UI)
        - PWA
        - TUI
        - All platforms
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request.
      placeholder: Any other relevant information...
    validations:
      required: false

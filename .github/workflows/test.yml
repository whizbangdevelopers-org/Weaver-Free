# Tests and CI
# CREATED IN: Dev repo
# USED BY: CI pipeline on push/PR to main
# TRIGGERS: push to main, pull_request to main
#
# REQUIRED SECRETS (optional, for dynamic badges):
#   - GIST_TOKEN: PAT with gist scope for updating CI badges
#   - TEST_BADGE_GIST_ID: Gist ID containing badge JSON files
#
# BADGE FILES (written to gist on main push):
#   - vitest-badge.json   (unit tests)
#   - backend-badge.json  (backend tests)
#   - tui-badge.json      (TUI tests)

name: Tests

on:
  push:
    tags: ['v*']         # Badge updates on release only — pre-push hook covers main
  pull_request:
    branches: [main]
  workflow_dispatch:       # Manual trigger for debugging

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        id: vitest
        run: |
          npm run test:unit:run -- --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "Unit tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.GIST_TOKEN != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: vitest-badge.json
          label: unit tests
          message: "${{ steps.vitest.outputs.passed }} passed"
          color: ${{ steps.vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-report
          path: code/coverage/
          retention-days: 30

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend linter
        run: cd backend && npm run lint

      - name: Run backend typecheck
        run: cd backend && npm run typecheck

      - name: Run backend tests
        id: backend-vitest
        run: |
          cd backend
          npx vitest run --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "Backend tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Update backend test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.GIST_TOKEN != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: backend-badge.json
          label: backend tests
          message: "${{ steps.backend-vitest.outputs.passed }} passed"
          color: ${{ steps.backend-vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

  tui-tests:
    name: TUI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install TUI dependencies
        run: cd tui && npm ci

      - name: Run TUI typecheck
        run: cd tui && npm run typecheck

      - name: Run TUI tests
        id: tui-vitest
        run: |
          cd tui
          npx vitest run --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "TUI tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Update TUI test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.GIST_TOKEN != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: tui-badge.json
          label: tui tests
          message: "${{ steps.tui-vitest.outputs.passed }} passed"
          color: ${{ steps.tui-vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

  compliance:
    name: Compliance Auditors
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../tui && npm ci

      - name: Build TUI (needed for cli-args audit)
        run: npm run build:tui

      - name: Run security audit
        run: npm run test:security

      - name: Run compliance suite
        run: npm run test:compliance

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

# Tests and CI
# CREATED IN: Dev repo
# USED BY: CI pipeline on push/PR to main
# TRIGGERS: push to main, pull_request to main
#
# REQUIRED SECRETS (optional, for dynamic badges):
#   - GIST_TOKEN: PAT with gist scope for updating CI badges
#   - TEST_BADGE_GIST_ID: Gist ID containing badge JSON files
#
# BADGE FILES (written to gist on main push):
#   - vitest-badge.json                  (unit tests)
#   - backend-badge.json                 (backend tests)
#   - tui-badge.json                     (TUI tests)
#   - total-badge.json                   (unit + backend + TUI sum)
#   - compliance-auditors-badge.json     (auditor count from package.json)

name: Tests

on:
  push:
    tags: ['v*']         # Badge updates on release only — pre-push hook covers main
  pull_request:
    branches: [main]
  workflow_dispatch:       # Manual trigger for debugging

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.vitest.outputs.passed }}
      failed: ${{ steps.vitest.outputs.failed }}
    defaults:
      run:
        # Dev repo: code lives in code/. Free repo: sync flattens code/ → root.
        working-directory: ${{ github.repository == 'whizbangdevelopers-org/Weaver-Dev' && 'code' || '.' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        # Shim files (demo.ts, useDemoContainerState.ts) use `typeof import('./excluded-data')`
        # to derive types. On Free those files don't exist → tsc falls back to any → implicit-any
        # errors in components. Typecheck is authoritative on Dev; skip on Free mirror.
        if: github.repository == 'whizbangdevelopers-org/Weaver-Dev'
        run: npm run typecheck

      - name: Run unit tests
        id: vitest
        run: |
          npm run test:unit:run -- --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "Unit tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Update test badge
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.WEAVER_FREE_GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: vitest-badge.json
          label: unit tests
          message: "${{ steps.vitest.outputs.passed }} passed"
          color: ${{ steps.vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-report
          path: code/coverage/
          retention-days: 30

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.backend-vitest.outputs.passed }}
      failed: ${{ steps.backend-vitest.outputs.failed }}
    defaults:
      run:
        working-directory: ${{ github.repository == 'whizbangdevelopers-org/Weaver-Dev' && 'code' || '.' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Run backend linter
        run: cd backend && npm run lint

      - name: Run backend typecheck
        if: github.repository == 'whizbangdevelopers-org/Weaver-Dev'
        run: cd backend && npm run typecheck

      - name: Run backend tests
        id: backend-vitest
        run: |
          cd backend
          npx vitest run --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "Backend tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Update backend test badge
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.WEAVER_FREE_GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: backend-badge.json
          label: backend tests
          message: "${{ steps.backend-vitest.outputs.passed }} passed"
          color: ${{ steps.backend-vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

  tui-tests:
    name: TUI Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.tui-vitest.outputs.passed }}
      failed: ${{ steps.tui-vitest.outputs.failed }}
    defaults:
      run:
        working-directory: ${{ github.repository == 'whizbangdevelopers-org/Weaver-Dev' && 'code' || '.' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Run TUI typecheck
        if: github.repository == 'whizbangdevelopers-org/Weaver-Dev'
        run: cd tui && npm run typecheck

      - name: Run TUI tests
        id: tui-vitest
        run: |
          cd tui
          npx vitest run --reporter=json --outputFile=test-results.json || true

          # Extract test counts from JSON output
          if [[ -f test-results.json ]]; then
            PASSED=$(jq '[.testResults[].assertionResults[] | select(.status == "passed")] | length' test-results.json)
            FAILED=$(jq '[.testResults[].assertionResults[] | select(.status == "failed")] | length' test-results.json)
            TOTAL=$((PASSED + FAILED))

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "TUI tests: $PASSED passed, $FAILED failed, $TOTAL total"
          fi

          # Fail if tests failed
          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi

      - name: Update TUI test badge
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.WEAVER_FREE_GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: tui-badge.json
          label: tui tests
          message: "${{ steps.tui-vitest.outputs.passed }} passed"
          color: ${{ steps.tui-vitest.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

  # Aggregates unit + backend + TUI pass/fail counts into a single total badge.
  # E2E is intentionally excluded — it runs via `update-e2e-badge.yml` manual
  # dispatch after `test:prerelease` (see testing policy in CLAUDE.md). The
  # "total" here is the CI-run suite total, not the release-gate total.
  total-tests-badge:
    name: Total Tests Badge
    needs: [unit-tests, backend-tests, tui-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Sum pass/fail counts across suites
        id: totals
        run: |
          PASSED=$(( ${{ needs.unit-tests.outputs.passed }} + ${{ needs.backend-tests.outputs.passed }} + ${{ needs.tui-tests.outputs.passed }} ))
          FAILED=$(( ${{ needs.unit-tests.outputs.failed }} + ${{ needs.backend-tests.outputs.failed }} + ${{ needs.tui-tests.outputs.failed }} ))
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "Total: $PASSED passed, $FAILED failed"

      - name: Update total-tests badge
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.WEAVER_FREE_GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: total-badge.json
          label: tests
          message: "${{ steps.totals.outputs.passed }} passing"
          color: ${{ steps.totals.outputs.failed == '0' && 'brightgreen' || 'red' }}
        continue-on-error: true

  compliance:
    name: Compliance Auditors
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.repository == 'whizbangdevelopers-org/Weaver-Dev' && 'code' || '.' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Build TUI (needed for cli-args audit)
        run: npm run build:tui

      - name: Run security audit
        run: npm run test:security

      - name: Run compliance suite
        run: npm run test:compliance

      # Derive the auditor count from package.json's test:compliance script
      # (single source of truth — same logic audit:doc-parity uses to verify
      # reference sites). Runs after the suite passes so a failing compliance
      # run never writes a "green" badge.
      - name: Compute auditor count
        id: auditors
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: |
          COUNT=$(node -e "const p = require('./package.json'); const s = p.scripts['test:compliance']; console.log((s.match(/npm run audit:[\w-]+/g) || []).length);")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Auditors: $COUNT"

      - name: Update compliance-auditors badge
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483  # v1.7.0
        with:
          auth: ${{ secrets.WEAVER_FREE_GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: compliance-auditors-badge.json
          label: compliance
          message: "${{ steps.auditors.outputs.count }} auditors"
          color: blue
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    defaults:
      run:
        working-directory: ${{ github.repository == 'whizbangdevelopers-org/Weaver-Dev' && 'code' || '.' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

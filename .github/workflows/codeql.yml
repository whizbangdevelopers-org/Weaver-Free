# CodeQL Analysis
# CREATED IN: All repos (Dev, Public, Premium, Enterprise, Plugins)
# USED BY: GitHub security scanning
# TRIGGERS: push, pull_request, weekly schedule, manual

name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 1 * * 0'   # Weekly Sunday 1am UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v3
        with:
          languages: ${{ matrix.language }}
          # Use extended queries for more thorough analysis
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v3
        with:
          category: "/language:${{ matrix.language }}"

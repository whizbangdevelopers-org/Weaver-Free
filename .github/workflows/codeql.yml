# CodeQL Analysis
# CREATED IN: All repos (Dev, Public, Premium, Enterprise, Plugins)
# USED BY: GitHub security scanning
# TRIGGERS: push/PR to main, weekly schedule, manual
# NOTE: push trigger is required for OpenSSF Scorecard SAST check (10/10 vs 9/10).
#       Workflow skips on private Dev repo via visibility check — runner startup cost is
#       unavoidable without maintaining separate workflow files per repo.

name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 1 * * 0'   # Weekly Sunday 1am UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze
    # Skip on private repos — GitHub code scanning upload requires Advanced Security on private repos.
    # CodeQL runs on the public Weaver-Free mirror where it's free.
    if: github.event.repository.visibility != 'private'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f5c2471be782132e47a6e6f9c725e56730d6e9a3  # v3
        with:
          languages: ${{ matrix.language }}
          # Use extended queries for more thorough analysis
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@f5c2471be782132e47a6e6f9c725e56730d6e9a3  # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f5c2471be782132e47a6e6f9c725e56730d6e9a3  # v3
        with:
          category: "/language:${{ matrix.language }}"

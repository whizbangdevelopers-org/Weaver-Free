name: Version Drift Check

# Monthly check: are any blocked dependencies now unblocked?
# Queries npm for Quasar's peer deps and compares against the blocked list.
# Comments on the tracking issue (#39) when a blocker clears.

on:
  schedule:
    # First Monday of each month at 10:00 AM Pacific
    - cron: '0 17 1-7 * 1'
  workflow_dispatch: # Manual trigger for testing

permissions:
  issues: write
  contents: read

env:
  TRACKING_ISSUE: 39

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Check Quasar peer deps against blocked list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "Checking version drift for blocked dependencies..."
          echo ""

          # Get Quasar's latest peer dependencies from npm
          QUASAR_PEERS=$(npm view quasar peerDependencies --json 2>/dev/null || echo "{}")
          QUASAR_APP_PEERS=$(npm view @quasar/app-vite peerDependencies --json 2>/dev/null || echo "{}")
          QUASAR_VERSION=$(npm view quasar version 2>/dev/null || echo "unknown")
          APP_VITE_VERSION=$(npm view @quasar/app-vite version 2>/dev/null || echo "unknown")

          echo "Latest Quasar: $QUASAR_VERSION"
          echo "Latest @quasar/app-vite: $APP_VITE_VERSION"
          echo ""

          # Blocked packages and their current installed major versions
          # Format: "package:current_major:blocked_reason"
          BLOCKED=(
            "vite:6:blocked-by-quasar"
            "vue:3:blocked-by-quasar"
            "vue-router:4:blocked-by-quasar"
            "pinia:2:blocked-by-quasar"
            "typescript:5:blocked-by-quasar"
            "eslint:8:blocked-by-quasar"
          )

          UNBLOCKED=""
          STILL_BLOCKED=""

          for entry in "${BLOCKED[@]}"; do
            IFS=':' read -r pkg current_major reason <<< "$entry"

            # Get the latest available major version from npm
            latest=$(npm view "$pkg" version 2>/dev/null || echo "")
            latest_major=$(echo "$latest" | cut -d. -f1)

            # Check what Quasar accepts for this package
            quasar_range=$(echo "$QUASAR_PEERS" | jq -r --arg p "$pkg" '.[$p] // empty' 2>/dev/null)
            app_vite_range=$(echo "$QUASAR_APP_PEERS" | jq -r --arg p "$pkg" '.[$p] // empty' 2>/dev/null)
            peer_range="${quasar_range:-${app_vite_range:-not a peer dep}}"

            if [ "$latest_major" != "" ] && [ "$latest_major" != "$current_major" ]; then
              # There IS a newer major version available
              # Check if Quasar's peer range now accepts it
              # Simple heuristic: if peer range contains the latest major number, it's unblocked
              if echo "$peer_range" | grep -qE "(^|\s)${latest_major}(\.|$|\s)" 2>/dev/null ||
                 echo "$peer_range" | grep -q ">=${latest_major}" 2>/dev/null; then
                UNBLOCKED="${UNBLOCKED}| ${pkg} | ${current_major}.x | ${latest} | ${peer_range} | Quasar ${QUASAR_VERSION} |\n"
                echo "UNBLOCKED: $pkg $current_major.x -> $latest (Quasar accepts: $peer_range)"
              else
                STILL_BLOCKED="${STILL_BLOCKED}| ${pkg} | ${current_major}.x | ${latest} | ${peer_range} |\n"
                echo "Still blocked: $pkg $current_major.x (latest: $latest, Quasar wants: $peer_range)"
              fi
            else
              echo "Current: $pkg $current_major.x (no newer major)"
            fi
          done

          echo ""

          # If anything is unblocked, comment on the tracking issue
          if [ -n "$UNBLOCKED" ]; then
            COMMENT=$(cat <<COMMENT_EOF
          ## Version Drift Alert

          The following blocked dependencies can now be **unblocked** — Quasar's latest release accepts the newer major version:

          | Package | Current | Available | Quasar Peer Range | Unblocked By |
          |---------|---------|-----------|-------------------|--------------|
          $(echo -e "$UNBLOCKED")

          **Action required:**
          1. Remove the package from \`BLOCKED_PACKAGES\` in \`scripts/audit-security.ts\`
          2. Remove from \`QUASAR_BLOCKED\` in \`.github/workflows/dependabot-labeler.yml\`
          3. Merge the waiting Dependabot PR

          > Auto-generated by [version-drift-check.yml](.github/workflows/version-drift-check.yml) on $(date -u +'%Y-%m-%d')
          COMMENT_EOF
          )

            gh issue comment "$TRACKING_ISSUE" --body "$COMMENT"
            echo ""
            echo "Commented on #$TRACKING_ISSUE with unblock notification"
          else
            echo "No blocked dependencies have been unblocked. All clear."
          fi

          # Always log the still-blocked summary
          if [ -n "$STILL_BLOCKED" ]; then
            echo ""
            echo "Still blocked:"
            echo -e "$STILL_BLOCKED"
          fi

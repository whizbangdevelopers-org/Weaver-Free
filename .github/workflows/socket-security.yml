# Socket.dev supply chain security scan
# CREATED IN: Dev repo
# USED BY: Supply chain security (malicious packages, typosquatting, dependency confusion)
# TRIGGERS: weekly schedule, manual (push/PR triggers removed — skips on private Dev repo anyway)
#
# Setup required (one-time):
#   1. Install Socket Security GitHub App: https://github.com/apps/socket-security
#      (handles PR comments automatically — no secret needed for that path)
#   2. Add SOCKET_SECURITY_API_KEY to repo secrets (from https://socket.dev/dashboard)
#      The key is the full API key string shown in the dashboard (not the fingerprint hash).
#   3. Add SOCKET_ORG_SLUG to repo secrets — your Socket.dev organization slug.
#      Find it at: https://socket.dev/dashboard → org settings → slug in the URL.
#
# Threat model: Socket.dev catches supply chain attacks that CodeQL and npm audit miss:
#   - CodeQL  = taint analysis (code logic bugs, injection flaws)
#   - npm audit = CVE database (known vulnerabilities in published versions)
#   - Socket  = behavioral analysis (malicious packages, typosquats, dep confusion,
#               install scripts, obfuscated code, high-entropy strings, network calls)
#
# Note: SocketDev/action v1.3.2 documents 'cli' mode but does not implement it in the
# compiled action (only 'firewall' and 'patch' modes work). We run @socketsecurity/cli
# directly instead.

name: Socket Security

on:
  schedule:
    - cron: '0 7 * * 1'   # Weekly Monday 7am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  socket-scan:
    name: Socket supply-chain scan
    runs-on: ubuntu-latest
    # Only run on the public Free repo — the Dev repo is private and Socket's
    # free tier requires a public repo. Skip gracefully on private repo runs.
    if: github.event.repository.visibility != 'private'
    permissions:
      contents: read
      pull-requests: write  # Post PR comment with findings

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Run Socket scan
        # Exit code 1 = policy findings reported; non-blocking while establishing baseline.
        # Review findings at socket.dev/dashboard, then remove continue-on-error to enforce.
        continue-on-error: true
        run: |
          npx --yes @socketsecurity/cli scan create \
            --org "${{ secrets.SOCKET_ORG_SLUG }}" \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --commit-hash "${{ github.sha }}" \
            --report \
            --no-interactive
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}

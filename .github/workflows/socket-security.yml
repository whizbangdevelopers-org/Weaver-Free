# Socket.dev supply chain security scan
# CREATED IN: Dev repo
# USED BY: Supply chain security (malicious packages, typosquatting, dependency confusion)
# TRIGGERS: PRs to main that touch package files, push to main, weekly schedule
#
# Setup required (one-time):
#   1. Install Socket Security GitHub App: https://github.com/apps/socket-security
#   2. Add SOCKET_SECURITY_API_KEY to repo secrets (from https://socket.dev/dashboard)
#
# Threat model: Socket.dev catches supply chain attacks that CodeQL and npm audit miss:
#   - CodeQL  = taint analysis (code logic bugs, injection flaws)
#   - npm audit = CVE database (known vulnerabilities in published versions)
#   - Socket  = behavioral analysis (malicious packages, typosquats, dep confusion,
#               install scripts, obfuscated code, high-entropy strings, network calls)

name: Socket Security

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'backend/package.json'
      - 'backend/package-lock.json'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'backend/package.json'
      - 'backend/package-lock.json'
  schedule:
    - cron: '0 7 * * 1'   # Weekly Monday 7am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  socket-scan:
    name: Socket supply-chain scan
    runs-on: ubuntu-latest
    # Only run on the public Free repo — the Dev repo is private and Socket's
    # free tier requires a public repo. Skip gracefully on private repo runs.
    if: github.event.repository.visibility != 'private'
    permissions:
      contents: read
      pull-requests: write  # Post PR comment with findings

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Socket Security scan
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f  # v1.3.2
        with:
          mode: cli
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }}

# Demo Weekly Reset
# CREATED IN: Dev repo
# USED BY: Demo maintenance - resets demo data to sample state weekly
# TRIGGERS: Weekly schedule (Sundays at midnight UTC), manual
#
# REQUIRED SECRETS:
#   - DEMO_GITHUB_TOKEN: PAT from demo account with repo and gist scope
#   - VITE_HCAPTCHA_SITEKEY: hCaptcha site key (for optional redeploy)

name: Demo Reset

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      redeploy:
        description: 'Also redeploy the demo app after reset'
        required: false
        default: 'false'
        type: boolean

env:
  DEMO_ACCOUNT: weaver-demo
  DEMO_REPO: weaver-demo/weaver-demo.github.io

jobs:
  reset-demo-data:
    name: Reset Demo Data
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Get sample data IDs
        id: samples
        run: |
          # Read sample data configuration from demo directory
          if [ -d "demo/sample-data" ]; then
            echo "has_sample_data=true" >> $GITHUB_OUTPUT
            echo "Found sample data directory"
          else
            echo "has_sample_data=false" >> $GITHUB_OUTPUT
            echo "No sample data directory found"
          fi

          # Read sample gist IDs if they exist
          if [ -d "demo/sample-gists" ]; then
            SAMPLE_IDS=$(ls demo/sample-gists/*.json 2>/dev/null | xargs -I{} basename {} .json | tr '\n' ',' | sed 's/,$//')
            echo "sample_gist_ids=$SAMPLE_IDS" >> $GITHUB_OUTPUT
            echo "has_sample_gists=true" >> $GITHUB_OUTPUT
          else
            echo "has_sample_gists=false" >> $GITHUB_OUTPUT
          fi

      - name: Delete non-sample gists
        if: steps.samples.outputs.has_sample_gists == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEMO_GITHUB_TOKEN }}
        run: |
          SAMPLE_IDS="${{ steps.samples.outputs.sample_gist_ids }}"
          echo "Sample gist IDs to preserve: $SAMPLE_IDS"

          # Get all gists for the demo account
          GISTS=$(gh api users/${{ env.DEMO_ACCOUNT }}/gists --jq '.[].id' 2>/dev/null || echo "")

          if [ -z "$GISTS" ]; then
            echo "No gists found for demo account"
            exit 0
          fi

          DELETED=0
          PRESERVED=0

          for gist_id in $GISTS; do
            if echo ",$SAMPLE_IDS," | grep -q ",$gist_id,"; then
              echo "Preserving sample gist: $gist_id"
              ((PRESERVED++))
            else
              echo "Deleting gist: $gist_id"
              gh api gists/$gist_id -X DELETE 2>/dev/null || true
              ((DELETED++))
            fi
          done

          echo "Gist cleanup: Deleted $DELETED, Preserved $PRESERVED"
          echo "GISTS_DELETED=$DELETED" >> $GITHUB_ENV
          echo "GISTS_PRESERVED=$PRESERVED" >> $GITHUB_ENV

      - name: Reset sample data files
        if: steps.samples.outputs.has_sample_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEMO_GITHUB_TOKEN }}
        run: |
          echo "Resetting demo data to sample state..."

          # If there's a reset script in the demo directory, run it
          if [ -f "demo/scripts/reset-data.sh" ]; then
            chmod +x demo/scripts/reset-data.sh
            bash demo/scripts/reset-data.sh
          elif [ -f "demo/scripts/reset-data.js" ]; then
            node demo/scripts/reset-data.js
          else
            echo "No reset script found, skipping data reset"
          fi

      - name: Summary
        run: |
          echo "## Demo Reset Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date -u)" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ env.GISTS_DELETED }}" ]; then
            echo "- Gists deleted: ${{ env.GISTS_DELETED }}" >> $GITHUB_STEP_SUMMARY
            echo "- Gists preserved: ${{ env.GISTS_PRESERVED }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Redeploy requested: ${{ github.event.inputs.redeploy || 'false' }}" >> $GITHUB_STEP_SUMMARY

  redeploy:
    name: Redeploy Demo App
    runs-on: ubuntu-latest
    needs: [reset-demo-data]
    if: github.event.inputs.redeploy == 'true' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SPA for demo
        env:
          VITE_DEMO_MODE: 'true'
          VITE_HCAPTCHA_SITEKEY: ${{ secrets.VITE_HCAPTCHA_SITEKEY }}
        run: npx quasar build -m spa

      - name: Prepare deployment
        run: |
          touch dist/spa/.nojekyll
          if [ -f demo/DEMO-README.md ]; then
            cp demo/DEMO-README.md dist/spa/README.md
          fi

      - name: Deploy to demo repo
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f  # v4
        with:
          token: ${{ secrets.DEMO_GITHUB_TOKEN }}
          repository-name: ${{ env.DEMO_REPO }}
          branch: main
          folder: dist/spa
          clean-exclude: README.md
          commit-message: "Weekly demo reset and redeploy - $(date -u +%Y-%m-%d)"

      - name: Summary
        run: |
          echo "## Demo Redeployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.DEMO_ACCOUNT }}.github.io" >> $GITHUB_STEP_SUMMARY

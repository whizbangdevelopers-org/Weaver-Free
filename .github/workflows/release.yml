# Release Pipeline
# CREATED IN: Dev repo
# USED BY: Automated release on version tag push
# TRIGGERS: push to v* tags
#
# REQUIRED SECRETS:
#   - WEAVER_FREE_SYNC: PAT with repo scope for pushing to free repo and dispatching NUR
#
# REQUIRED ENVIRONMENTS:
#   - release-publish: Environment with required reviewers for manual approval
#
# FLOW:
#   1. Build frontend + backend artifacts
#   2. Create DRAFT GitHub release on Dev with auto-generated notes
#   3. Manual approval via 'release-publish' environment
#   4. Publish release (draft -> public)
#   5. Sync release to free repo (code + tag + release + assets)
#   6. Dispatch NUR packages update (hash computed from free repo)

name: Release

on:
  push:
    tags:
      - 'v*'

# Default-deny at workflow level; each job elevates only the scopes it needs.
# OpenSSF Scorecard's Token-Permissions check rewards default-read workflows
# with job-scoped elevation. Mirror the same discipline here.
permissions: read-all

env:
  FREE_REPO: whizbangdevelopers-org/Weaver-Free
  NUR_REPO: whizbangdevelopers-org/nur-packages

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Build all
        run: npm run build:all

      - name: Package PWA build
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf "weaver-${VERSION}-pwa.tar.gz" -C dist/pwa .

      - name: Upload PWA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pwa-build
          path: code/dist/pwa/
          retention-days: 30

      - name: Upload PWA tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pwa-tarball
          path: "code/weaver-*.tar.gz"
          retention-days: 30

      - name: Upload backend build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: backend-build
          path: code/backend/dist/
          retention-days: 30

      - name: Generate SBOM (frontend)
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json

      - name: Generate SBOM (backend)
        run: cd backend && npx @cyclonedx/cyclonedx-npm --output-file sbom-backend.cdx.json

      - name: Stage SBOM artifacts
        run: |
          mkdir -p ../sbom-staging
          cp sbom.cdx.json ../sbom-staging/
          cp backend/sbom-backend.cdx.json ../sbom-staging/

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom-staging/
          retention-days: 90

  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write       # create draft release + upload assets
      id-token: write       # cosign keyless signing (Sigstore OIDC)
      attestations: write   # actions/attest-build-provenance writes attestations

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download PWA tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: pwa-tarball
          path: ./release-assets/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sbom
          path: ./release-assets/

      # Keyless Sigstore signing. The OIDC token provided by `id-token: write`
      # authorizes cosign to request a short-lived signing certificate from
      # Fulcio and log the signature to Rekor. No long-lived keys, no secrets
      # to rotate. Produces .sig + .pem per artifact; uploaded as release
      # assets so OpenSSF Scorecard's Signed-Releases check can detect them.
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1
        with:
          # Pin to cosign 2.x. Cosign 3.0 changed the sign-blob default to
          # require explicit --bundle <path> or bare --new-bundle-format — both
          # produce a single .sigstore file instead of separate .sig + .pem
          # artifacts, breaking the README verification flow and downstream
          # consumer expectations. v3 migration is a deliberate v1.0.3+ change.
          cosign-release: 'v2.5.3'

      - name: Sign release artifacts (keyless Sigstore)
        env:
          COSIGN_YES: 'true'
        run: |
          cd ./release-assets
          # Cosign 2.x: --output-signature and --output-certificate produce
          # separate .sig and .pem files matching README verification flow.
          # Cosign v3 dropped these in favor of a single --bundle .sigstore
          # output; we pin v2.5.3 via the installer above to preserve the
          # artifact contract. Migration to v3 is a deliberate v1.0.3+ change.
          for file in weaver-*.tar.gz sbom.cdx.json sbom-backend.cdx.json; do
            if [ -f "$file" ]; then
              cosign sign-blob \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                "$file"
              echo "Signed: $file"
            fi
          done
          ls -la

      # GitHub attestations require either a paid plan or a public repo.
      # Weaver-Dev is private and the org is on the free plan, so these
      # steps are soft-fails here. Attestations fire successfully when the
      # Weaver-Free mirror (public) produces its own release assets via
      # the release-to-free step downstream. Remove continue-on-error only
      # when either: (a) the org upgrades to Team/Enterprise, or (b) this
      # workflow is moved to run on the public Free repo directly.
      # openssf-baseline-allow: attest-continue-on-error (private repo + free org plan)
      - name: Attest build provenance (PWA tarball)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        continue-on-error: true
        with:
          subject-path: ./release-assets/weaver-*.tar.gz

      - name: Attest build provenance (SBOM frontend)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        continue-on-error: true
        with:
          subject-path: ./release-assets/sbom.cdx.json

      - name: Attest build provenance (SBOM backend)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        continue-on-error: true
        with:
          subject-path: ./release-assets/sbom-backend.cdx.json

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            ./release-assets/weaver-*.tar.gz
            ./release-assets/weaver-*.tar.gz.sig
            ./release-assets/weaver-*.tar.gz.pem
            ./release-assets/sbom.cdx.json
            ./release-assets/sbom.cdx.json.sig
            ./release-assets/sbom.cdx.json.pem
            ./release-assets/sbom-backend.cdx.json
            ./release-assets/sbom-backend.cdx.json.sig
            ./release-assets/sbom-backend.cdx.json.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Draft Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: **DRAFT** (awaiting manual approval)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Test the draft release artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Approve the 'Publish Release' job in Actions" >> $GITHUB_STEP_SUMMARY

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release]
    environment: release-publish
    permissions:
      contents: write  # flip draft release to published

    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          IS_DRAFT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>/dev/null || echo "unknown")

          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
            echo "Release $TAG published"
          elif [ "$IS_DRAFT" = "false" ]; then
            echo "Release $TAG is already published"
          else
            echo "Could not find release $TAG"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  release-to-free:
    name: Release to Free Repo
    runs-on: ubuntu-latest
    needs: [publish]

    steps:
      - name: Checkout dev repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          path: dev

      - name: Checkout free repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ env.FREE_REPO }}
          token: ${{ secrets.WEAVER_FREE_SYNC }}
          fetch-depth: 0
          path: free

      - name: Configure git
        run: |
          cd free
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read sync exclusions config
        id: exclusions
        run: |
          CONFIG_FILE="dev/.github/sync-exclude.yml"
          EXTRA_EXCLUDES=""
          if [ -f "$CONFIG_FILE" ]; then
            echo "Reading repo-specific exclusions from $CONFIG_FILE"
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -z "$line" ] && continue
              [[ "$line" == "exclude:" ]] && continue
              path=$(echo "$line" | sed 's/^- //')
              [ -z "$path" ] && continue
              EXTRA_EXCLUDES="$EXTRA_EXCLUDES --exclude=$path"
              echo "  exclude: $path"
            done < "$CONFIG_FILE"
          else
            echo "No sync-exclude.yml found, using base exclusions only"
          fi
          echo "extra_excludes=$EXTRA_EXCLUDES" >> $GITHUB_OUTPUT

      - name: Sync code (dev/code/ → free root)
        run: |
          # Source MUST be dev/code/, not dev/. Dev is a multi-dir repo (code/,
          # business/, portfolio/, research/, agents/, MASTER-PLAN.md, etc.) and
          # the Free mirror should contain ONLY the flattened contents of code/.
          # Syncing dev/ (the whole repo) with --delete-excluded aggressively
          # leaks all of Dev's internal planning/strategy/GTM content to the
          # public Free repo — the excludes only cover code/-relative paths.
          # This exact bug leaked 72,807 lines of internal content on 2026-04-20
          # via the v1.0.2 attempted release (reverted with a force-push).
          #
          # --delete-excluded: cleans up files matching new exclusion patterns
          # --filter='P /.git' PROTECTS target's .git from deletion — must
          # precede exclude rules in rsync filter chain. Without it,
          # --delete-excluded + --exclude='.git' trashes target's .git.
          rsync -av --delete --delete-excluded \
            --filter='P /.git' \
            --exclude='.git' \
            --exclude='testing/' \
            --exclude='.claude/' \
            --exclude='CLAUDE.md' \
            --exclude='TESTING.md' \
            --exclude='playwright.config.ts' \
            --exclude='vitest.config.ts' \
            --exclude='.mcp.json' \
            ${{ steps.exclusions.outputs.extra_excludes }} \
            dev/code/ free/
            # flake.nix + flake.lock INCLUDED — Weaver-Free needs them at
            # root for users installing via direct flake input. Excluding
            # them broke Path B of UPGRADE.md (2026-04-21 discovery).

      - name: Sync .github config (dev/.github/ → free .github)
        run: |
          # .github config lives at repo root in both dev and free — sync
          # separately. Dev-only workflows and sync infrastructure are
          # excluded (mirrors the exclude set in sync-to-free.yml).
          rsync -av --delete --delete-excluded \
            --exclude='workflows/sync-to-free.yml' \
            --exclude='sync-exclude.yml' \
            --exclude='issue-mapping.json' \
            --exclude='dependabot.yml' \
            --exclude='workflows/dependabot-labeler.yml' \
            --exclude='workflows/dependabot-tracker.yml' \
            --exclude='workflows/version-drift-check.yml' \
            --exclude='workflows/demo-reset.yml' \
            --exclude='workflows/stale.yml' \
            dev/.github/ free/.github/

      - name: Commit and push changes
        run: |
          cd free
          git add -A

          if git diff --staged --quiet; then
            echo "No code changes to commit (repos already in sync)"
          else
            VERSION="${GITHUB_REF_NAME}"
            git commit -m "Release ${VERSION}"
            git push origin main
          fi

      - name: Create tag and release in free repo
        env:
          GH_TOKEN: ${{ secrets.WEAVER_FREE_SYNC }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd free

          # Ensure we're on latest main
          git pull origin main

          # Create version tag
          git tag -f "${VERSION}"
          git push origin "${VERSION}" --force

          # Get release notes from Dev release
          NOTES=$(gh release view "${VERSION}" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "Release ${VERSION}")

          # Create release on Free (skip if already exists)
          if gh release view "${VERSION}" --repo "${{ env.FREE_REPO }}" 2>/dev/null; then
            echo "Release ${VERSION} already exists on Free repo"
          else
            gh release create "${VERSION}" \
              --repo "${{ env.FREE_REPO }}" \
              --title "${VERSION}" \
              --notes "$NOTES"
            echo "Created release ${VERSION} on Free repo"
          fi

      - name: Copy release assets to free repo
        env:
          GH_TOKEN: ${{ secrets.WEAVER_FREE_SYNC }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          echo "Copying release assets from Dev to Free..."

          mkdir -p /tmp/release-assets
          cd /tmp/release-assets
          gh release download "${VERSION}" --repo "${{ github.repository }}"

          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "${VERSION}" "$file" \
                --repo "${{ env.FREE_REPO }}" \
                --clobber || echo "  Failed: $file"
            fi
          done

          ASSET_COUNT=$(gh release view "${VERSION}" --repo "${{ env.FREE_REPO }}" --json assets -q '.assets | length')
          echo "Release ${VERSION} on Free repo has $ASSET_COUNT assets"

      - name: Summary
        run: |
          echo "## Free Repo Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Free repo: ${{ env.FREE_REPO }}" >> $GITHUB_STEP_SUMMARY

  update-nur:
    name: Update NUR Packages
    runs-on: ubuntu-latest
    needs: [release-to-free]
    if: "!contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')"

    steps:
      # LICENSING GATE: NUR only receives the Free tier (AGPL-3.0). Solo / Team /
      # Fabrick are BSL-1.1 and must never be dispatched to NUR. This step fails
      # loud if FREE_REPO is mis-set to Weaver-Dev or any paid-tier repository.
      - name: Assert NUR dispatch is Free-tier only
        run: |
          EXPECTED="whizbangdevelopers-org/Weaver-Free"
          if [ "${{ env.FREE_REPO }}" != "$EXPECTED" ]; then
            echo "::error::LICENSING GATE FAILED — FREE_REPO is '${{ env.FREE_REPO }}', expected '$EXPECTED'."
            echo "::error::NUR distributes AGPL-3.0 Free tier only. Commercial tiers (BSL-1.1) must not be dispatched."
            echo "::error::Revert the FREE_REPO env var to the public Weaver-Free repo before retrying."
            exit 1
          fi
          echo "Licensing gate OK: dispatching Free-tier source from $EXPECTED"

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956  # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Compute source hash from free repo (fetchFromGitHub-compatible)
        id: hash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARBALL_URL="https://github.com/${{ env.FREE_REPO }}/archive/refs/tags/${VERSION}.tar.gz"
          echo "Computing hash from Free repo: $TARBALL_URL"

          # CRITICAL: fetchFromGitHub hashes the EXTRACTED source tree, not
          # the .tar.gz file bytes. A naive `curl | sha256sum` computes the
          # file-level hash which is rejected at build time with a mismatch.
          # Use `nix-prefetch-url --unpack` so the hash matches what Nix
          # recomputes when consuming this package in a real build.
          # Retry to allow CDN propagation.
          for attempt in 1 2 3; do
            echo "Prefetch attempt $attempt/3..."
            # nix-prefetch-url prints the base32 hash on stdout; --unpack
            # tells it to unpack and hash the directory tree (matching
            # fetchFromGitHub's behavior exactly).
            BASE32=$(nix-prefetch-url --type sha256 --unpack "$TARBALL_URL" 2>/dev/null || true)

            if [ -n "$BASE32" ]; then
              # Convert base32 → SRI (sha256-<base64>) for fetchFromGitHub.
              SRI=$(nix-hash --to-sri --type sha256 "$BASE32")
              echo "sri=$SRI" >> $GITHUB_OUTPUT
              echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
              echo "Source hash (SRI, extracted-content): $SRI"
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Prefetch returned empty, waiting 15s..."
              sleep 15
            else
              echo "Failed to prefetch source tarball after 3 attempts"
              exit 1
            fi
          done

      - name: Extract npmDepsHash from nixos/package.nix
        id: npmdeps
        run: |
          # NUR's weaver-free/default.nix has TWO hashes:
          #   1. src.hash — source tarball SRI (computed above from Free tag)
          #   2. npmDepsHash — buildNpmPackage's prefetch of package-lock.json
          #
          # Without this step, the dispatch only sent #1, so NUR's npmDepsHash
          # stayed frozen at whatever was last manually written. That caused
          # the v1.0.2 initial NUR build to fail with a hash mismatch on the
          # npm-deps derivation. audit:nix-deps-hash guarantees the value in
          # nixos/package.nix matches package-lock.json on every push, so
          # reading from package.nix is authoritative — no separate prefetch
          # needed.
          #
          # audit:nur-dispatch-completeness (scripts/verify-nur-dispatch-completeness.ts)
          # static-checks that the dispatch payload below carries BOTH hashes.
          NPM_HASH=$(grep -oP 'npmDepsHash = "\Ksha256-[^"]+' code/nixos/package.nix)
          if [ -z "$NPM_HASH" ]; then
            echo "::error::Could not extract npmDepsHash from code/nixos/package.nix"
            exit 1
          fi
          echo "npm_hash=$NPM_HASH" >> $GITHUB_OUTPUT
          echo "npmDepsHash: $NPM_HASH"

      - name: Dispatch NUR weaver-free update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ secrets.WEAVER_FREE_SYNC }}
          repository: ${{ env.NUR_REPO }}
          event-type: weaver-free-release
          client-payload: |
            {
              "version": "${{ steps.hash.outputs.version }}",
              "hash": "${{ steps.hash.outputs.sri }}",
              "npmDepsHash": "${{ steps.npmdeps.outputs.npm_hash }}",
              "tag": "${{ github.ref_name }}"
            }

      - name: Summary
        run: |
          echo "## NUR Update Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Package: weaver-free" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.hash.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Source Hash (SRI): ${{ steps.hash.outputs.sri }}" >> $GITHUB_STEP_SUMMARY
          echo "- npmDepsHash: ${{ steps.npmdeps.outputs.npm_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- Source: ${{ env.FREE_REPO }} (Free repo)" >> $GITHUB_STEP_SUMMARY
          echo "- NUR Repo: ${{ env.NUR_REPO }}" >> $GITHUB_STEP_SUMMARY

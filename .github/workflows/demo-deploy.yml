# Public Demo Deployment (Decision #135)
# CREATED IN: Dev repo
# USED BY: Tag-based deployment of public demo to GitHub Pages
# TRIGGERS: demo/* tag push, manual dispatch
#
# The public demo is a marketing funnel (Decision #135), not the private QA demo.
# Tag with demo/vX.Y to deploy (e.g., demo/v1.0). Private demo tracks main.
#
# REQUIRED SECRETS:
#   - WEAVER_FREE_DEMO: PAT from weaver-demo account with repo scope
#     (tier-prefixed convention — matches WEAVER_FREE_SYNC)
#   - VITE_HCAPTCHA_SITEKEY: hCaptcha site key for demo login

name: Demo Deploy

on:
  push:
    tags: ['demo/*']
  workflow_dispatch:

env:
  DEMO_REPO: weaver-demo/weaver-demo.github.io

jobs:
  build-and-deploy:
    name: Build and Deploy Demo
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        working-directory: code
        run: npm ci

      - name: Build SPA for public demo
        working-directory: code
        env:
          VITE_DEMO_MODE: 'true'
          VITE_DEMO_PUBLIC: 'true'
          VITE_HCAPTCHA_SITEKEY: ${{ secrets.VITE_HCAPTCHA_SITEKEY }}
        run: npx quasar build -m spa

      - name: Prepare deployment
        run: |
          # Create .nojekyll for GitHub Pages
          touch code/dist/spa/.nojekyll

          # Copy demo README if exists
          if [ -f code/demo/DEMO-README.md ]; then
            cp code/demo/DEMO-README.md code/dist/spa/README.md
          fi

          # Include license in demo build
          cp code/LICENSE code/dist/spa/LICENSE

          # Block AI crawlers from using the demo as training data
          if [ -f code/demo/robots.txt ]; then
            cp code/demo/robots.txt code/dist/spa/robots.txt
          fi

          # Inject noai meta tags into index.html (after charset meta)
          sed -i 's|<meta charset="utf-8">|<meta charset="utf-8">\n    <meta name="robots" content="noai, noimageai">|' code/dist/spa/index.html

      - name: Deploy to demo repo
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f  # v4
        with:
          token: ${{ secrets.WEAVER_FREE_DEMO }}
          repository-name: ${{ env.DEMO_REPO }}
          branch: main
          folder: code/dist/spa
          clean-exclude: README.md
          commit-message: "Deploy demo app - ${{ github.sha }}"

      - name: Summary
        run: |
          DEMO_ACCOUNT="${{ env.DEMO_REPO }}"
          DEMO_ACCOUNT="${DEMO_ACCOUNT%%/*}"
          echo "## Public Demo Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${DEMO_ACCOUNT}.github.io" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Demo mode: enabled (public)" >> $GITHUB_STEP_SUMMARY

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bomb SVG Workbench</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 24px; }
  h1 { text-align: center; margin-bottom: 24px; }
  .compare { display: flex; gap: 40px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .panel { text-align: center; }
  .panel h3 { margin-bottom: 12px; color: #aaa; font-size: 14px; }
  .panel img { height: 300px; }
  .sizes { display: flex; gap: 24px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
  .sizes .sz { text-align: center; }
  .sizes .sz p { font-size: 11px; color: #888; margin-top: 4px; }
  .on-white { background: #fff; padding: 16px; border-radius: 8px; display: inline-block; }
  .on-dark { background: #121212; padding: 16px; border-radius: 8px; display: inline-block; }
</style>
</head>
<body>
<h1>Bomb SVG Workbench</h1>

<div class="compare">
  <div class="panel">
    <h3>PNG Reference (bomb crop)</h3>
    <div class="on-dark">
      <img src="whizBANG! Developers LLC bomb crop logo.png" style="height:300px">
    </div>
  </div>
  <div class="panel">
    <h3>PNG Reference (on black)</h3>
    <div class="on-dark">
      <img src="downloads/whizbang-bomb-only.png" style="height:300px">
    </div>
  </div>
  <div class="panel">
    <h3>PNG-in-SVG (importable)</h3>
    <div class="on-dark" style="padding:24px;">
      <img src="bomb-png-wrapped.svg" style="height:260px;">
    </div>
  </div>
  <div class="panel">
    <h3>SVG Build (dark bg)</h3>
    <div class="on-dark" style="padding:24px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
        <defs>
          <!-- Bomb body: matte dark with subtle highlight, NOT glossy -->
          <radialGradient id="bodyGrad" cx="0.40" cy="0.38" r="0.60" fx="0.35" fy="0.33">
            <stop offset="0%" stop-color="#3A3A3A"/>
            <stop offset="20%" stop-color="#303030"/>
            <stop offset="50%" stop-color="#252525"/>
            <stop offset="80%" stop-color="#1E1E1E"/>
            <stop offset="100%" stop-color="#161616"/>
          </radialGradient>

          <!-- Fuse collar brown gradient -->
          <linearGradient id="collarBrown" x1="0" y1="0" x2="0.8" y2="1">
            <stop offset="0%" stop-color="#A07840"/>
            <stop offset="40%" stop-color="#8B6B3C"/>
            <stop offset="70%" stop-color="#6B4A2A"/>
            <stop offset="100%" stop-color="#4A3018"/>
          </linearGradient>

          <!-- Fuse collar green gradient -->
          <linearGradient id="collarGreen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8CC820"/>
            <stop offset="50%" stop-color="#7AB800"/>
            <stop offset="100%" stop-color="#5A9A10"/>
          </linearGradient>

          <!-- Spark center glow -->
          <radialGradient id="sparkGlow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="15%" stop-color="#FFF0D0"/>
            <stop offset="35%" stop-color="#FFD060"/>
            <stop offset="55%" stop-color="#FFB300"/>
            <stop offset="75%" stop-color="#FF8800" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
          </radialGradient>

          <!-- Spark bloom filter -->
          <filter id="sparkBloom" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>

          <!-- Drop shadow -->
          <filter id="dropShadow" x="-30%" y="-20%" width="160%" height="150%">
            <feDropShadow dx="-4" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
          </filter>

          <!-- Green ring glow -->
          <filter id="ringGlow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="glow"/>
            <feComposite in="SourceGraphic" in2="glow" operator="over"/>
          </filter>
        </defs>

        <!-- === DROP SHADOW === -->
        <circle cx="120" cy="168" r="88" fill="#000" opacity="0.3" filter="url(#dropShadow)"/>

        <!-- === DARK OUTLINE === -->
        <!-- Main outline ring -->
        <circle cx="120" cy="165" r="92" fill="none" stroke="#131313" stroke-width="8"/>
        <!-- Extra shadow on upper-left for 3D depth -->
        <path d="M 48 100 A 92 92 0 0 0 32 185"
              fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
        <path d="M 55 85 A 92 92 0 0 0 38 175"
              fill="none" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

        <!-- === BOMB BODY === -->
        <circle cx="120" cy="165" r="84" fill="url(#bodyGrad)" stroke="#2A2A2A" stroke-width="1.5"/>

        <!-- === BODY HIGHLIGHT (subtle upper-left shine) === -->
        <ellipse cx="100" cy="142" rx="32" ry="26" fill="#444" opacity="0.10"/>
        <ellipse cx="95" cy="138" rx="18" ry="14" fill="#555" opacity="0.08"/>

        <!-- === GREEN RING HIGHLIGHT === -->
        <g filter="url(#ringGlow)">
          <!-- Dark green shadow (behind, slightly offset) -->
          <path d="M 55 228 A 88 88 0 1 1 185 95"
                fill="none" stroke="#2D5A1B" stroke-width="5" stroke-linecap="round" opacity="0.5"
                transform="translate(1,2)"/>
          <!-- Bright green ring -->
          <path d="M 55 228 A 88 88 0 1 1 185 95"
                fill="none" stroke="#7AB800" stroke-width="3.5" stroke-linecap="round"/>
          <!-- Lighter green highlight on top arc -->
          <path d="M 78 85 A 88 88 0 0 1 170 108"
                fill="none" stroke="#9AD030" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </g>

        <!-- === FUSE COLLAR === -->
        <g transform="translate(180, 100) rotate(42)">
          <!-- Outer brown collar body -->
          <rect x="-15" y="-14" width="30" height="28" rx="4" fill="url(#collarBrown)" stroke="#3A2810" stroke-width="1"/>
          <!-- Green band (center) -->
          <rect x="-16" y="-4" width="32" height="10" rx="3" fill="url(#collarGreen)" stroke="#2D5A1B" stroke-width="0.7"/>
          <!-- Top highlight -->
          <rect x="-12" y="-11" width="24" height="6" rx="2" fill="#B09060" opacity="0.35"/>
          <!-- Bottom shadow -->
          <rect x="-12" y="6" width="24" height="5" rx="2" fill="#2A1808" opacity="0.4"/>
        </g>

        <!-- === FUSE (longer, curving upward) === -->
        <path d="M 192 88 Q 208 68 218 55 Q 228 42 232 34"
              fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
        <path d="M 192 88 Q 208 68 218 55 Q 228 42 232 34"
              fill="none" stroke="#8B6B3C" stroke-width="2" stroke-linecap="round"/>
        <!-- Fuse highlight -->
        <path d="M 194 86 Q 209 67 219 54"
              fill="none" stroke="#A08050" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

        <!-- === SPARK BURST (dramatic, multi-point) === -->
        <g transform="translate(240, 22)">
          <!-- Large outer glow -->
          <circle cx="0" cy="0" r="45" fill="url(#sparkGlow)" opacity="0.4"/>
          <circle cx="0" cy="0" r="30" fill="url(#sparkGlow)" opacity="0.3"/>

          <!-- Major pointed rays (polygon shapes, not lines) -->
          <g opacity="0.85">
            <!-- Ray 1: upper-right (longest) -->
            <polygon points="0,0 32,-14 35,-10 4,0" fill="#FFB300"/>
            <polygon points="0,0 35,-10 38,-6 5,1" fill="#DD9900" opacity="0.6"/>
            <!-- Ray 2: right -->
            <polygon points="0,0 36,4 34,9 3,2" fill="#FFB300"/>
            <!-- Ray 3: upper (near vertical) -->
            <polygon points="0,0 8,-34 13,-32 3,-2" fill="#FFB300"/>
            <polygon points="0,0 13,-32 17,-29 4,-1" fill="#DD9900" opacity="0.5"/>
            <!-- Ray 4: lower-right -->
            <polygon points="0,0 28,18 24,22 1,4" fill="#FFAA00"/>
            <!-- Ray 5: slight left of up -->
            <polygon points="0,0 -4,-28 1,-28 2,-1" fill="#FFB300"/>
            <!-- Ray 6: upper-right (between 1 and 3) -->
            <polygon points="0,0 22,-26 26,-22 3,-1" fill="#FFAA00"/>
            <!-- Ray 7: slight lower-left -->
            <polygon points="0,0 -12,20 -8,22 1,3" fill="#DD9900" opacity="0.7"/>
            <!-- Ray 8: left -->
            <polygon points="0,0 -18,-6 -16,-2 -1,1" fill="#DD9900" opacity="0.6"/>
          </g>

          <!-- Bright hot center layers -->
          <circle cx="0" cy="0" r="14" fill="#FFD080" filter="url(#sparkBloom)"/>
          <circle cx="0" cy="0" r="9" fill="#FFE8C0"/>
          <circle cx="0" cy="0" r="5" fill="#FFF5E0"/>
          <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
        </g>
      </svg>
    </div>
  </div>
  <div class="panel">
    <h3>SVG Build (white bg)</h3>
    <div class="on-white" style="padding:24px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
        <defs>
          <radialGradient id="bodyGrad2" cx="0.40" cy="0.38" r="0.60" fx="0.35" fy="0.33">
            <stop offset="0%" stop-color="#3A3A3A"/><stop offset="20%" stop-color="#303030"/><stop offset="50%" stop-color="#252525"/><stop offset="80%" stop-color="#1E1E1E"/><stop offset="100%" stop-color="#161616"/>
          </radialGradient>
          <linearGradient id="collarBrown2" x1="0" y1="0" x2="0.8" y2="1">
            <stop offset="0%" stop-color="#A07840"/><stop offset="40%" stop-color="#8B6B3C"/><stop offset="70%" stop-color="#6B4A2A"/><stop offset="100%" stop-color="#4A3018"/>
          </linearGradient>
          <linearGradient id="collarGreen2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8CC820"/><stop offset="50%" stop-color="#7AB800"/><stop offset="100%" stop-color="#5A9A10"/>
          </linearGradient>
          <radialGradient id="sparkGlow2" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stop-color="#FFFFFF"/><stop offset="15%" stop-color="#FFF0D0"/><stop offset="35%" stop-color="#FFD060"/><stop offset="55%" stop-color="#FFB300"/><stop offset="75%" stop-color="#FF8800" stop-opacity="0.5"/><stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
          </radialGradient>
          <filter id="sparkBloom2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
          <filter id="dropShadow2" x="-30%" y="-20%" width="160%" height="150%"><feDropShadow dx="-4" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/></filter>
          <filter id="ringGlow2" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceGraphic" stdDeviation="2" result="glow"/><feComposite in="SourceGraphic" in2="glow" operator="over"/></filter>
        </defs>
        <circle cx="120" cy="168" r="88" fill="#000" opacity="0.2" filter="url(#dropShadow2)"/>
        <circle cx="120" cy="165" r="92" fill="none" stroke="#131313" stroke-width="8"/>
        <path d="M 48 100 A 92 92 0 0 0 32 185" fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
        <circle cx="120" cy="165" r="84" fill="url(#bodyGrad2)" stroke="#2A2A2A" stroke-width="1.5"/>
        <ellipse cx="100" cy="142" rx="32" ry="26" fill="#444" opacity="0.08"/>
        <g filter="url(#ringGlow2)">
          <path d="M 55 228 A 88 88 0 1 1 185 95" fill="none" stroke="#2D5A1B" stroke-width="5" stroke-linecap="round" opacity="0.4" transform="translate(1,2)"/>
          <path d="M 55 228 A 88 88 0 1 1 185 95" fill="none" stroke="#7AB800" stroke-width="3.5" stroke-linecap="round"/>
        </g>
        <g transform="translate(180, 100) rotate(42)">
          <rect x="-15" y="-14" width="30" height="28" rx="4" fill="url(#collarBrown2)" stroke="#3A2810" stroke-width="1"/>
          <rect x="-16" y="-4" width="32" height="10" rx="3" fill="url(#collarGreen2)" stroke="#2D5A1B" stroke-width="0.7"/>
          <rect x="-12" y="-11" width="24" height="6" rx="2" fill="#B09060" opacity="0.3"/>
          <rect x="-12" y="6" width="24" height="5" rx="2" fill="#2A1808" opacity="0.3"/>
        </g>
        <path d="M 192 88 Q 208 68 218 55 Q 228 42 232 34" fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
        <path d="M 192 88 Q 208 68 218 55 Q 228 42 232 34" fill="none" stroke="#8B6B3C" stroke-width="2" stroke-linecap="round"/>
        <g transform="translate(240, 22)">
          <circle cx="0" cy="0" r="45" fill="url(#sparkGlow2)" opacity="0.35"/>
          <circle cx="0" cy="0" r="30" fill="url(#sparkGlow2)" opacity="0.25"/>
          <g opacity="0.85">
            <polygon points="0,0 32,-14 35,-10 4,0" fill="#FFB300"/>
            <polygon points="0,0 35,-10 38,-6 5,1" fill="#DD9900" opacity="0.6"/>
            <polygon points="0,0 36,4 34,9 3,2" fill="#FFB300"/>
            <polygon points="0,0 8,-34 13,-32 3,-2" fill="#FFB300"/>
            <polygon points="0,0 28,18 24,22 1,4" fill="#FFAA00"/>
            <polygon points="0,0 -4,-28 1,-28 2,-1" fill="#FFB300"/>
            <polygon points="0,0 22,-26 26,-22 3,-1" fill="#FFAA00"/>
            <polygon points="0,0 -12,20 -8,22 1,3" fill="#DD9900" opacity="0.7"/>
            <polygon points="0,0 -18,-6 -16,-2 -1,1" fill="#DD9900" opacity="0.6"/>
          </g>
          <circle cx="0" cy="0" r="14" fill="#FFD080" filter="url(#sparkBloom2)"/>
          <circle cx="0" cy="0" r="9" fill="#FFE8C0"/>
          <circle cx="0" cy="0" r="5" fill="#FFF5E0"/>
          <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
        </g>
      </svg>
    </div>
  </div>
</div>

<!-- Size tests -->
<h2 style="text-align:center; margin-top:48px; margin-bottom:16px;">Size Tests</h2>
<div class="sizes">
  <div class="sz">
    <div class="on-dark" style="padding:8px;">
      <img src="bomb-png-wrapped.svg" style="height:120px;">
    </div>
    <p>PNG-SVG 120px</p>
  </div>
  <div class="sz">
    <div class="on-dark" style="padding:4px;">
      <img src="whizBANG! Developers LLC bomb crop logo.png" style="height:120px;">
    </div>
    <p>PNG 120px</p>
  </div>
  <div class="sz">
    <div class="on-dark" style="padding:8px;">
      <img src="bomb-png-wrapped.svg" style="height:48px;">
    </div>
    <p>PNG-SVG 48px</p>
  </div>
  <div class="sz">
    <div class="on-dark" style="padding:4px;">
      <img src="whizBANG! Developers LLC bomb crop logo.png" style="height:48px;">
    </div>
    <p>PNG 48px</p>
  </div>
  <div class="sz">
    <div class="on-dark" style="padding:8px;">
      <img src="bomb-png-wrapped.svg" style="height:32px;">
    </div>
    <p>PNG-SVG 32px</p>
  </div>
</div>

</body>
</html>
